<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>diddymark | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="signup">
    <div class="bg-shape bg-shape-1" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-2" aria-hidden="true"></div>

    <main class="app home-app">
      <section class="hero">
        <p class="eyebrow">diddymark Account</p>
        <h1>Sign Up</h1>
        <p class="hero-copy">Create your account, then log in to access single and test modes.</p>
      </section>

      <section class="panel home-grid">
        <article class="selector-card">
          <form id="signupForm" class="home-form">
            <label>
              Full Name
              <input id="signupName" type="text" required placeholder="e.g. Daniel Tran" />
            </label>
            <label>
              School
              <input id="signupSchool" type="text" required placeholder="e.g. North Sydney Boys" />
            </label>
            <label>
              Email
              <input id="signupEmail" type="email" required placeholder="you@example.com" />
            </label>
            <label>
              Mobile Number
              <input id="signupPhone" type="tel" required placeholder="04xx xxx xxx" />
            </label>
            <label>
              Create Password
              <input id="signupPassword" type="password" required minlength="6" placeholder="At least 6 characters" />
            </label>
            <label>
              Confirm Password
              <input id="signupPasswordConfirm" type="password" required minlength="6" placeholder="Re-enter password" />
            </label>
            <button type="submit" class="primary">Create Account</button>
          </form>
          <p id="signupStatus" class="meta">All fields are required.</p>
        </article>

        <article class="selector-card">
          <h2>Already have an account?</h2>
          <p class="meta">Go straight to login.</p>
          <div class="home-actions">
            <a class="mode-link" href="login.html">Open Login</a>
            <a class="mode-link" href="index.html">Back to Home</a>
          </div>
        </article>
      </section>
    </main>

    <script src="auth.js"></script>
  </body>
</html>
